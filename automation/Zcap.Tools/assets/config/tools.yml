Python:
  Version: "3.11"
  Command: python
  WingetId: "Python.Python.{0}"
  # Enables --scope user on winget. Note: Python 3.11's burn installer may
  # still trigger UAC. Two paths to eliminate remaining admin requirements:
  #   Option A: Vendor uv (astral.sh/uv) — user-space Python on all platforms.
  #   Option B: Upgrade to 3.12+ — fixes the burn installer UAC issue.
  WingetScope: user
  BrewFormula: "python@{0}"
  AptPackage: "python{0}"
  VersionCommand: "python --version"
  VersionPattern: "^Python (?<ver>.+)$"

Dotnet:
  Version: "10.0"
  Command: dotnet
  # Installed via vendored install scripts — no package manager, no admin.
  # Install dir defaults: Windows = LOCALAPPDATA\<Command>, Unix = HOME/.<Command>.
  # Override per platform with WindowsInstallDir / UnixInstallDir if needed.
  ScriptInstall: true
  WindowsInstallDir: "Microsoft\\dotnet"
  VersionCommand: "dotnet --version"
  VersionPattern: "^(?<ver>.+)$"

AzCli:
  Version: "2.84"
  Command: az
  DependsOn: Python
  # macOS: Homebrew (user-space). Windows/Linux: pip (user-space).
  # winget MSI and apt-get both require admin — pip avoids that.
  BrewFormula: "azure-cli"
  PipPackage: azure-cli
  VersionCommand: "az version --output tsv"
  VersionPattern: "^(?<ver>[^\t]+)"

Poetry:
  Version: "1.7"
  Command: poetry
  DependsOn: Python
  PipPackage: poetry
  VersionCommand: "poetry --version"
  VersionPattern: "^Poetry \\(version (?<ver>.+)\\)$"

NodeJs:
  Version: "22"
  Command: node
  WingetId: "OpenJS.NodeJS.{0}"
  WingetScope: user
  BrewFormula: "node@{0}"
  AptPackage: "nodejs"
  VersionCommand: "node --version"
  VersionPattern: "^v(?<ver>.+)$"
