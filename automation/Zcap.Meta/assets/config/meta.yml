subscription_types:
  - prod
  - nonprod

environments:
  dev:
    details: Development
    subscription_type: nonprod
  test:
    details: Test
    subscription_type: nonprod
  preprod:
    details: Pre-Production
    subscription_type: prod
  prod:
    details: Production
    subscription_type: prod

environment_subtypes:
  - sub
  - env

environment_types:
  customer:
    core_customer:
      subtypes: []
    workspace_sub:
      subtypes: [sub, env]
    workspace_bi:
