    environment_types:
      - core_customer
      - workspace_bi
  nova:
    details: Nova Systems
    environment_types:
      - core_customer
  flux:
    details: Flux Energy
    environment_types:
      - core_customer
  dusk:
    details: Dusk Analytics
    environment_types:
      - core_customer
  warp:
    details: Warp Logistics
